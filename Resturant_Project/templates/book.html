{% extends 'base.html' %}
{% load static %}
{% block content %}

<h1>Book a Table</h1>

<div class="booking-container">
    <h2>🍽️ Book Your Table</h2>

   
    <form id="bookingForm">
        <!-- Name -->
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter Your Name" required>

        <!-- Phone Number -->
        <label>Phone number</label>
        <input 
            type="tel" 
            id="phone" 
            placeholder="Enter 10 digit phone number"
            pattern="[0-9]{10}"
            maxlength="10"
            required
        >

        <!-- Date -->
        <label>Date</label>
        <input type="date" id="date" required>

        <!-- Time -->
        <label>Time</label>
        <div class="time-box">
            <select id="hour"></select>
            <select id="minute"></select>
            <select id="ampm">
                <option value="AM">AM</option>
                <option value="PM">PM</option>
            </select>
        </div>

        <!-- Table -->
        <label>Enter Table</label>
        <select id="table" required>
            <option value="">Select Table</option>
        </select>

        <!-- Buttons -->
        <div class="btn-box">
            <button type="submit">Book Table</button>
            <button type="reset">Reset</button>
        </div>
    </form>

    <p id="message"></p>
</div>

<script>
    const tableSelect = document.getElementById("table");
    const hourSelect = document.getElementById("hour");
    const minuteSelect = document.getElementById("minute");
    const message = document.getElementById("message");

    // 100 tables
    for (let i = 1; i <= 100; i++) {
        let option = document.createElement("option");
        option.value = "Table " + i;
        option.text = "Table " + i;
        tableSelect.appendChild(option);
    }

    // Hour 1–12
    for (let h = 1; h <= 12; h++) {
        let option = document.createElement("option");
        option.value = h;
        option.text = h;
        hourSelect.appendChild(option);
    }

    // Minute 00–59
    for (let m = 0; m < 60; m++) {
        let option = document.createElement("option");
        option.value = m < 10 ? "0" + m : m;
        option.text = m < 10 ? "0" + m : m;
        minuteSelect.appendChild(option);
    }

    let bookedTables = [];

    document.getElementById("bookingForm").addEventListener("submit", function(e) {
        e.preventDefault();

        let table = tableSelect.value;

        if (bookedTables.includes(table)) {
            message.style.color = "red";
            message.innerText = "❌ Table already booked!";
        } else {
            bookedTables.push(table);
            message.style.color = "green";
            message.innerText = "✅ Successfully table booked!";
        }
    });
   
</script>


{% endblock %}
